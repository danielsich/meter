<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark pill background -->
  <circle cx="16" cy="16" r="16" fill="#0f1117"/>
  <!-- gauge track: 240° arc, gap at bottom (210°–330°) -->
  <!-- start 330°: (25.53, 10.5)  end 210°: (6.47, 10.5) -->
  <path d="M 25.53 10.5 A 11 11 0 1 1 6.47 10.5"
        fill="none" stroke="#252a35" stroke-width="3" stroke-linecap="round"/>
  <!-- active fill: ~72% of 240° = 173° arc, end at 143° -->
  <!-- 143°: x=16+11·cos143°=16−8.79=7.21  y=16+11·sin143°=16+6.62=22.62 -->
  <!-- 173° > 180° → large-arc-flag=0 (it's exactly < 180), sweep=1 -->
  <!-- actually 173 < 180 so large-arc = 0 -->
  <path d="M 25.53 10.5 A 11 11 0 0 1 7.21 22.62"
        fill="none" stroke="#4d9eff" stroke-width="3" stroke-linecap="round"/>
  <!-- needle from center toward ~72% mark (143°) -->
  <!-- tip at r=7.5: x=16+7.5·cos143°=16−5.99=10.01  y=16+7.5·sin143°=16+4.51=20.51 -->
  <line x1="16" y1="16" x2="10.01" y2="20.51"
        stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- center pivot -->
  <circle cx="16" cy="16" r="2" fill="#4d9eff"/>
</svg>
